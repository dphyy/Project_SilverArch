<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>SilverArch · Officer queue</title><link rel="stylesheet" href="/styles.css"></head>
<body class="officer-body">
  <header class="topbar"><a class="brand" href="/">SilverArch</a><nav><a href="/">Citizen call</a><a href="/officer.html" aria-current="page">Officer view</a></nav></header>
  <main class="dashboard">
    <section class="dashboard-head"><div><p class="eyebrow">SSO workspace</p><h1>After-hours review queue</h1><p class="muted">Urgent risk first, then longest waiting.</p></div><div class="dashboard-actions"><button id="refresh" class="secondary">Refresh cases</button></div></section>
    <section class="queue-filters" aria-label="Case filters"><label>Status<select id="filter-status"><option value="all">All</option><option value="needs-review">Needs review</option><option value="report-draft">Report draft</option><option value="report-finalized">Report finalized</option><option value="accepted">Legacy accepted</option><option value="escalated">Escalated</option></select></label><label>Review reason<select id="filter-reason"><option value="all">All</option><option value="urgent">Urgent risk</option><option value="translation">Translation issue</option><option value="missing">Missing information</option><option value="confidence">Low confidence</option><option value="pii">PII review</option></select></label></section>
    <section class="stats"><article><span id="case-count">—</span><small>Waiting</small></article><article><span id="urgent-count">—</span><small>Urgent risk</small></article><article><span id="review-count">—</span><small>Manual review</small></article></section>
    <div class="workspace"><section><h2>Cases</h2><div id="case-list" class="case-list"></div></section><section id="case-detail" class="detail empty"><p>Select a case to review its testimony and audit details.</p></section></div>
  </main>
  <script type="module" src="/officer.js"></script>
</body>
</html>
